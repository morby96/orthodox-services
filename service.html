<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orthodox Service</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="lang-both">
  <header class="site-header">
    <div class="container">
      <a class="back-link" href="./">← Back to services</a>
      <h1 id="service-title">Loading…</h1>
      <div id="service-meta" class="service-meta"></div>

      <div class="controls">
        <label>
          Language:
          <select id="language-mode" class="mode-button">
            <option value="both">English + Slavonic</option>
            <option value="en">English only</option>
            <option value="cu">Slavonic only</option>
          </select>
        </label>

        <label>
          <input type="checkbox" id="show-rubrics" checked />
          Show rubrics
        </label>

        <label>
          Font size:
          <input type="range" id="font-size" min="15" max="26" value="18" />
        </label>

        <button id="expand-all-btn" class="mode-button" type="button">Expand All</button>
        <button id="collapse-all-btn" class="mode-button" type="button">Collapse All</button>
      </div>
    </div>
  </header>

  <main class="container service-layout">
    <aside class="sidebar">
      <div class="sidebar-box">
        <h2 class="sidebar-title">Search</h2>
        <input
          id="service-search"
          class="search-input"
          type="search"
          placeholder="Search this service..."
          aria-label="Search this service"
        />
        <div id="search-status" class="search-status"></div>
      </div>

      <div class="sidebar-box">
        <h2 class="sidebar-title">Sections</h2>
        <nav id="section-nav" class="section-nav"></nav>
      </div>
    </aside>

    <section class="main-content">
      <div id="service-content"></div>
    </section>
  </main>

  <script src="service.js"></script>
</body>
</html>
