<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orthodox Services</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Orthodox Services</h1>
      <p class="service-meta">Service texts in English and Church Slavonic</p>
    </div>
  </header>

  <main class="container">
    <div class="toolbar">
      <input
        id="site-search"
        class="search-input"
        type="search"
        placeholder="Search services..."
        aria-label="Search services"
      />
    </div>

    <div id="service-list" class="card-list"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
